<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeten-Eroberung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            background-color: #000;
            color: #e2e8f0;
            height: 100vh;
            width: 100vw;
        }
        #background-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            opacity: 0.4;
        }
        canvas {
            background-color: transparent; /* Canvas ist jetzt durchsichtig */
            border-radius: 0.5rem;
            cursor: pointer;
        }
        .btn { transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .modal-bg { background-color: rgba(0,0,0,0.7); z-index: 50; }
        /* Style für den Schieberegler */
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 10px; background: #4a5568; border-radius: 5px; outline: none; opacity: 0.7; transition: opacity .2s; }
        input[type=range]:hover { opacity: 1; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 25px; height: 25px; background: #63b3ed; cursor: pointer; border-radius: 50%; }
        input[type=range]::-moz-range-thumb { width: 25px; height: 25px; background: #63b3ed; cursor: pointer; border-radius: 50%; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen p-4">

    <video autoplay muted loop id="background-video">
        <source src="HG02.mp4" type="video/mp4">
        Dein Browser unterstützt keine Hintergrund-Videos.
    </video>

    <div id="setup-container" class="w-full max-w-lg mx-auto text-center p-6 bg-gray-800/70 backdrop-blur-sm rounded-lg shadow-lg mb-4">
        <h1 class="text-4xl font-bold mb-6 text-gray-200">Planeten-Eroberung</h1>
        <div class="flex justify-center items-center mb-4">
            <label for="player-count" class="text-xl font-semibold text-white mr-4">Anzahl der KI-Gegner:</label>
            <select id="player-count" class="bg-gray-700 text-white p-2 rounded-lg text-lg">
                <option value="1">1</option> <option value="2" selected>2</option> <option value="3">3</option> <option value="4">4</option> <option value="5">5</option>
            </select>
        </div>
        <div class="flex justify-center items-center mb-6">
             <label for="difficulty" class="text-xl font-semibold text-white mr-4">Schwierigkeit:</label>
            <select id="difficulty" class="bg-gray-700 text-white p-2 rounded-lg text-lg">
                <option value="easy">Leicht</option> <option value="normal" selected>Normal</option> <option value="hard">Schwer</option>
            </select>
        </div>
        <button id="start-game-btn" class="btn bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg text-lg">Spiel starten</button>
    </div>

    <div id="game-container" class="w-full max-w-7xl mx-auto flex-col items-center hidden">
        <div id="status-bar" class="w-full bg-gray-800/70 backdrop-blur-sm p-3 rounded-lg shadow-lg mb-4">
            <p id="status-text" class="text-xl font-semibold text-white text-center mb-2">Spiel wird initialisiert...</p>
            <div id="players-stats" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 text-center"></div>
        </div>
        <canvas id="gameCanvas" class="w-full"></canvas>
        <div id="controls" class="mt-4">
            <button id="end-turn-btn" class="btn bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-lg text-lg shadow-md" style="display: none;">Zug beenden</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="game-over-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center">
        <div class="bg-gray-800/90 backdrop-blur-sm p-8 rounded-lg shadow-2xl text-center">
            <h2 id="game-over-title" class="text-3xl font-bold mb-4"></h2>
            <p id="game-over-text" class="text-xl mb-6"></p>
            <button id="restart-btn" class="btn bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-lg text-xl">Neues Spiel</button>
        </div>
    </div>

    <div id="move-troops-modal" class="hidden fixed inset-0 modal-bg flex items-center justify-center">
        <div class="bg-gray-800/90 backdrop-blur-sm p-8 rounded-lg shadow-2xl text-center w-11/12 max-w-sm">
            <h2 class="text-2xl font-bold mb-4">Raumschiffe verschieben</h2>
            <p id="move-ships-text" class="text-lg mb-4"></p>
            <div class="flex items-center gap-4">
                <input type="range" id="move-ships-slider" min="1" value="1">
                <span id="slider-value" class="text-2xl font-bold w-12 text-center">1</span>
            </div>
            <div class="flex justify-center gap-4 mt-6">
                <button id="confirm-move-btn" class="btn bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded">Bestätigen</button>
                <button id="cancel-move-btn" class="btn bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let NUM_PLAYERS = 3;
        const NUM_TERRITORIES = 25;
        const TERRITORY_RADIUS = 30;
        const PLAYER_COLORS = ['#FFFFFF', '#63b3ed', '#f56565', '#48bb78', '#f6e05e', '#ed8936', '#b794f4'];
        const AI_PERSONALITIES = ['AGGRESSIVE', 'DEFENSIVE', 'CONQUEROR'];
        const HUMAN_NAMES = ['Von Braun', 'Tsiolkovsky', 'Goddard', 'Oberth', 'Korolev', 'Clarke'];
        let aiPlayers = [];
        
        let territories = [];
        let animations = [];
        let gameState = 'SETUP';
        let currentPlayerId = 1;
        let reinforcements = 0;
        let selectedTerritory = null;
        let fortifySource = null;
        let hasFortified = false;
        let difficulty = 'normal';
        let gameTime = 0;

        const synth = new Tone.Synth().toDestination();
        const metalSynth = new Tone.MetalSynth({ frequency: 150, envelope: { attack: 0.001, decay: 0.1, release: 0.01 }, harmonicity: 3.1, modulationIndex: 16, resonance: 4000, octaves: 0.5 }).toDestination();
        const delay = ms => new Promise(res => setTimeout(res, ms));

        function playSound(note, duration = '8n', time) {
            if (Tone.context.state !== 'running') { Tone.context.resume(); }
            synth.triggerAttackRelease(note, duration, time);
        }
        function playAttackSound() {
            if (Tone.context.state !== 'running') { Tone.context.resume(); }
            metalSynth.triggerAttackRelease("C1", "16n", Tone.now());
        }
        const adjustColor = (color, percent) => {
            const num = parseInt(color.slice(1), 16), amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255)).toString(16).slice(1);
        };

        class Territory {
            constructor(id, x, y) {
                this.id = id; this.x = x; this.y = y; this.owner = 0; this.troops = 0; this.connections = []; this.isHovered = false;
                this.hasRing = Math.random() > 0.8;
                this.ringAngle = Math.random() * Math.PI;
                this.moons = [];
                if (Math.random() > 0.6) {
                    const numMoons = Math.floor(Math.random() * 2) + 1;
                    for(let i=0; i<numMoons; i++) {
                        this.moons.push({
                            angle: Math.random() * Math.PI * 2,
                            distance: TERRITORY_RADIUS + 10 + Math.random() * 10,
                            radius: Math.random() * 2 + 1,
                            speed: (Math.random() - 0.5) * 0.02
                        });
                    }
                }
            }
            draw() {
                // Monde
                this.moons.forEach(moon => {
                    const moonX = this.x + Math.cos(moon.angle) * moon.distance;
                    const moonY = this.y + Math.sin(moon.angle) * moon.distance;
                    ctx.beginPath();
                    ctx.arc(moonX, moonY, moon.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#aaa';
                    ctx.fill();
                });

                // HINTERER Ringteil
                if (this.hasRing) {
                    ctx.strokeStyle = 'rgba(160, 160, 160, 0.7)'; ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, TERRITORY_RADIUS + 5, (TERRITORY_RADIUS + 5) * 0.3, this.ringAngle, 0, Math.PI);
                    ctx.stroke();
                }

                // Verbindungen
                ctx.lineWidth = 2;
                this.connections.forEach(connId => {
                    const target = territories.find(t => t.id === connId);
                    if (target.owner === this.owner && this.owner !== 0) {
                        ctx.strokeStyle = PLAYER_COLORS[this.owner]; ctx.globalAlpha = 0.6; 
                    } else {
                        ctx.strokeStyle = '#4a5568'; ctx.globalAlpha = 1.0;
                    }
                    ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(target.x, target.y); ctx.stroke();
                });
                ctx.globalAlpha = 1.0; 

                // Planetenkörper
                const baseColor = PLAYER_COLORS[this.owner] || '#4a5568';
                const lightColor = adjustColor(baseColor, 50);
                const darkColor = adjustColor(baseColor, -50);
                const gradient = ctx.createRadialGradient(this.x - TERRITORY_RADIUS/3, this.y - TERRITORY_RADIUS/3, TERRITORY_RADIUS/10, this.x, this.y, TERRITORY_RADIUS);
                gradient.addColorStop(0, lightColor); gradient.addColorStop(0.8, baseColor); gradient.addColorStop(1, darkColor);
                ctx.beginPath(); ctx.arc(this.x, this.y, TERRITORY_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                const isSelected = selectedTerritory === this || fortifySource === this;
                ctx.shadowColor = (isSelected || this.isHovered) ? 'white' : 'transparent';
                ctx.shadowBlur = (isSelected || this.isHovered) ? 20 : 0;
                ctx.fill(); ctx.shadowBlur = 0;
                if (isSelected) { ctx.strokeStyle = 'yellow'; ctx.lineWidth = 4; ctx.stroke(); }
                
                // VORDERER Ringteil
                if (this.hasRing) {
                    ctx.strokeStyle = 'rgba(180, 180, 180, 0.9)'; ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, TERRITORY_RADIUS + 5, (TERRITORY_RADIUS + 5) * 0.3, this.ringAngle, Math.PI, Math.PI * 2);
                    ctx.stroke();
                }

                // Raumschiff-Anzahl
                ctx.fillStyle = 'white'; ctx.font = 'bold 20px Roboto Condensed'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'black'; ctx.shadowBlur = 5;
                ctx.fillText(this.troops, this.x, this.y);
                ctx.shadowBlur = 0;
            }
            update() {
                this.moons.forEach(moon => moon.angle += moon.speed);
            }
        }
        class TroopAnimation {
             constructor(startX, startY, endX, endY, color, onComplete) {
                this.x = startX; this.y = startY; this.endX = endX; this.endY = endY;
                this.progress = 0; this.speed = 0.02; this.onComplete = onComplete; this.color = color;
            }
            update() {
                this.x += (this.endX - this.x) * this.speed * 5; this.y += (this.endY - this.y) * this.speed * 5;
                if (Math.hypot(this.x - this.endX, this.y - this.endY) < 5) { this.progress = 1; }
                return this.progress >= 1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }
        
        function initGame() {
            const gameContainer = document.getElementById('game-container');
            document.getElementById('setup-container').classList.add('hidden');
            gameContainer.classList.remove('hidden'); gameContainer.classList.add('flex');
            
            NUM_PLAYERS = parseInt(document.getElementById('player-count').value) + 1;
            difficulty = document.getElementById('difficulty').value;

            canvas.width = gameContainer.clientWidth; canvas.height = window.innerHeight * 0.6;
            
            territories = []; animations = [];
            currentPlayerId = 1; selectedTerritory = null; fortifySource = null; gameState = 'INIT';
            
            const availableNames = [...HUMAN_NAMES].sort(() => 0.5 - Math.random());
            aiPlayers = [];
            for (let i = 2; i <= NUM_PLAYERS; i++) {
                aiPlayers.push({ id: i, name: availableNames.pop() || `KI ${i-1}`, personality: AI_PERSONALITIES[Math.floor(Math.random() * AI_PERSONALITIES.length)] });
            }
            for (let i = 0; i < NUM_TERRITORIES; i++) {
                let validPos = false, x, y;
                while (!validPos) {
                    x = Math.random() * (canvas.width - TERRITORY_RADIUS * 4) + TERRITORY_RADIUS * 2;
                    y = Math.random() * (canvas.height - TERRITORY_RADIUS * 4) + TERRITORY_RADIUS * 2;
                    validPos = !territories.some(t => Math.hypot(x - t.x, y - t.y) < TERRITORY_RADIUS * 4);
                }
                territories.push(new Territory(i, x, y));
            }
            
            // Konnektivität sicherstellen
            territories.forEach(t1 => {
                let sortedByDist = territories.map(t2 => ({t2, dist: Math.hypot(t1.x-t2.x, t1.y-t2.y)})).sort((a,b) => a.dist - b.dist);
                for(let i=1; i < sortedByDist.length && t1.connections.length < 4; i++){
                    let t2 = sortedByDist[i].t2;
                     if (t1.id === t2.id || t1.connections.includes(t2.id) || t2.connections.length >= 4) continue;
                     if(Math.random() > 0.4) {
                         t1.connections.push(t2.id); t2.connections.push(t1.id);
                     }
                }
            });
            const checkConnectivity = () => {
                if (territories.length === 0) return true;
                let reachable = new Set(); let q = [territories[0].id]; reachable.add(territories[0].id);
                while(q.length > 0) {
                    const u = q.shift();
                    const uTerritory = territories.find(t => t.id === u);
                    uTerritory.connections.forEach(vId => { if(!reachable.has(vId)){ reachable.add(vId); q.push(vId); } });
                }
                return reachable.size === NUM_TERRITORIES;
            };
            while(!checkConnectivity()) {
                 let allNodes = new Set(territories.map(t => t.id));
                 let reachable = new Set(); let q = [territories[0].id]; reachable.add(territories[0].id);
                 while(q.length > 0) { const u = q.shift(); const uTerritory = territories.find(t => t.id === u); uTerritory.connections.forEach(vId => { if(!reachable.has(vId)){ reachable.add(vId); q.push(vId); }});}
                 let unreachable = new Set([...allNodes].filter(x => !reachable.has(x)));
                 if(unreachable.size > 0) {
                     const uNodeId = unreachable.values().next().value;
                     // Find closest reachable node
                     const uNode = territories.find(t => t.id === uNodeId);
                     let closestDist = Infinity;
                     let closestRNodeId = -1;
                     for (const rNodeId of reachable) {
                         const rNode = territories.find(t => t.id === rNodeId);
                         const dist = Math.hypot(uNode.x - rNode.x, uNode.y - rNode.y);
                         if (dist < closestDist) {
                             closestDist = dist;
                             closestRNodeId = rNodeId;
                         }
                     }
                     territories.find(t => t.id === uNodeId).connections.push(closestRNodeId);
                     territories.find(t => t.id === closestRNodeId).connections.push(uNodeId);
                 }
            }
            
            let territoryIds = territories.map(t => t.id).sort(() => Math.random() - 0.5);
            territoryIds.forEach((id, index) => {
                territories[id].owner = (index % NUM_PLAYERS) + 1;
                territories[id].troops = 1;
            });
            document.getElementById('game-over-modal').classList.add('hidden');
            setupUI();
            startPlayerTurn();
        }

        function startPlayerTurn() {
            currentPlayerId = 1; hasFortified = false;
            if (territories.filter(t => t.owner === currentPlayerId).length === 0 && gameState !== 'GAME_OVER') { endTurn(); return; }
            reinforcements = Math.max(3, Math.floor(territories.filter(t => t.owner === 1).length / 3));
            gameState = 'REINFORCE';
            updateStatus();
            playSound('C4', '8n');
        }

        function handleReinforce(territory) {
            if (territory.owner !== 1 || reinforcements <= 0) return;
            territory.troops++; reinforcements--;
            playSound('E4', '16n');
            updateStatus();
            if (reinforcements === 0) { gameState = 'ATTACK'; updateStatus(); }
        }
        
        function handleAttack(source, target) {
            if (source.owner !== 1 || target.owner === 1 || source.troops <= 1 || !source.connections.includes(target.id)) return;
            playAttackSound();
            animations.push(new TroopAnimation(source.x, source.y, target.x, target.y, 'rgba(255, 255, 0, 0.8)', () => battle(source, target)));
        }

        function battle(attacker, defender) {
             while (attacker.troops > 1 && defender.troops > 0) {
                let attackerRolls = Array(Math.min(3, attacker.troops - 1)).fill(0).map(() => Math.ceil(Math.random() * 6)).sort((a,b) => b-a);
                let defenderRolls = Array(Math.min(2, defender.troops)).fill(0).map(() => Math.ceil(Math.random() * 6)).sort((a,b) => b-a);
                const luck = Math.random();
                if (luck < 0.05) { attackerRolls[0] = 1; } else if (luck > 0.95) { attackerRolls[0] = 6; }
                for (let i = 0; i < Math.min(attackerRolls.length, defenderRolls.length); i++) {
                    if (attackerRolls[i] > defenderRolls[i]) { defender.troops--; } else { attacker.troops--; }
                }
                if (checkGameOver()) return;
             }
             if (defender.troops <= 0) {
                playSound('G5', '4n');
                defender.owner = attacker.owner; defender.troops = attacker.troops - 1; attacker.troops = 1;
             } else { playSound('C3', '4n'); }
             selectedTerritory = null; updateStatus(); checkGameOver();
        }
        
        // HINZUGEFÜGT: Fehlende Funktion
        function handleFortify(source, dest) {
            if (source.owner !== 1 || dest.owner !== 1 || source === dest || hasFortified) return;
            if (!isPathConnected(source.id, dest.id, 1)) {
                document.getElementById('status-text').textContent = "Keine durchgehende Verbindung!";
                fortifySource = null; // Auswahl zurücksetzen
                setTimeout(updateStatus, 2000);
                return;
            }
            const modal = document.getElementById('move-troops-modal');
            const slider = document.getElementById('move-ships-slider');
            const sliderValue = document.getElementById('slider-value');
            const textElement = document.getElementById('move-ships-text');

            textElement.textContent = `Verschiebe von Planet mit ${source.troops} Raumschiffen.`;
            slider.max = source.troops - 1;
            slider.value = 1;
            sliderValue.textContent = 1;

            slider.oninput = () => { sliderValue.textContent = slider.value; };

            modal.classList.remove('hidden');

            document.getElementById('confirm-move-btn').onclick = () => {
                const amount = parseInt(slider.value, 10);
                if (amount > 0 && amount < source.troops) {
                    source.troops -= amount;
                    dest.troops += amount;
                    hasFortified = true;
                    playSound('A4', '8n');
                    modal.classList.add('hidden');
                    fortifySource = null;
                    updateStatus();
                }
            };
            document.getElementById('cancel-move-btn').onclick = () => {
                modal.classList.add('hidden');
                fortifySource = null;
            };
        }

        // HINZUGEFÜGT: Fehlende Funktion
        function isPathConnected(sourceId, destId, playerId) {
            let q = [sourceId];
            let visited = new Set([sourceId]);
            while (q.length > 0) {
                const currentId = q.shift();
                if (currentId === destId) return true;
                const currentTerritory = territories.find(t => t.id === currentId);
                if (!currentTerritory) continue;
                currentTerritory.connections.forEach(nId => {
                    const neighbor = territories.find(t => t.id === nId);
                    if (neighbor && !visited.has(nId) && neighbor.owner === playerId) {
                        visited.add(nId);
                        q.push(nId);
                    }
                });
            }
            return false;
        }


        function endTurn() {
            if (gameState === 'ATTACK') { gameState = 'FORTIFY'; updateStatus(); return; }
            if (gameState === 'GAME_OVER') return;
            selectedTerritory = null; fortifySource = null;
            const initialPlayerId = currentPlayerId;
            let nextPlayerId = currentPlayerId;
            do {
                nextPlayerId = (nextPlayerId % NUM_PLAYERS) + 1;
            } while (!territories.some(t => t.owner === nextPlayerId) && nextPlayerId !== initialPlayerId);
            
            currentPlayerId = nextPlayerId;
            
            if (checkGameOver() || !territories.some(t => t.owner === currentPlayerId)) { return; }

            if (currentPlayerId === 1) {
                startPlayerTurn();
            } else {
                gameState = 'AI_TURN';
                const aiPlayer = aiPlayers.find(p => p.id === currentPlayerId);
                updateStatus();
                if(aiPlayer) runAITurn(aiPlayer); else endTurn();
            }
        }
        
        async function runAITurn(aiPlayer) {
            if (gameState === 'GAME_OVER') return;
            const { id, personality } = aiPlayer;
            if (!territories.some(t => t.owner === id)) { endTurn(); return; }
            
            runAIReinforcePhase({ id, personality });
            await delay(500);
            if (checkGameOver()) return;

            await runAIAttackPhase({ id, personality });
            if (checkGameOver()) return;

            runAIFortifyPhase({ id, personality });
            await delay(500);
            if (checkGameOver()) return;

            endTurn();
        }

        function runAIReinforcePhase({ id, personality }) {
            let aiTerritories = territories.filter(t => t.owner === id);
            let aiReinforcements = Math.max(3, Math.floor(aiTerritories.length / 3));
            if(difficulty === 'hard') aiReinforcements++;

            let borderTerritories = aiTerritories.filter(t => t.connections.some(cId => territories.find(t2=>t2.id===cId)?.owner !== id));
            if (borderTerritories.length > 0) {
                let reinforcedTerritory;
                switch (personality) {
                    case 'AGGRESSIVE': reinforcedTerritory = borderTerritories.sort((a,b) => b.troops - a.troops)[0]; break;
                    case 'DEFENSIVE': reinforcedTerritory = borderTerritories.sort((a,b) => a.troops - b.troops)[0]; break;
                    default: reinforcedTerritory = borderTerritories.sort((a,b) => a.connections.filter(c => territories.find(t2=>t2.id===c)?.owner !== id).length - b.connections.filter(c => territories.find(t2=>t2.id===c)?.owner !== id).length)[0]; break;
                }
                if(reinforcedTerritory) reinforcedTerritory.troops += aiReinforcements;
            } else if (aiTerritories.length > 0) { aiTerritories[0].troops += aiReinforcements; }
            playSound('D3', '8n');
            updateStatus();
        }
        
        async function runAIAttackPhase({ id, personality }) {
            if(checkGameOver()) return;
            let attackThreshold;
            switch(difficulty) {
                case 'easy': attackThreshold = personality === 'DEFENSIVE' ? 3.0 : 2.0; break;
                case 'hard': attackThreshold = personality === 'DEFENSIVE' ? 2.0 : 1.1; break;
                default: attackThreshold = personality === 'DEFENSIVE' ? 2.5 : 1.5; break;
            }
            
            for (let i = 0; i < 3; i++) {
                if (checkGameOver()) break;
                
                let possibleAttacks = [];
                territories.filter(t => t.owner === id && t.troops > 1).forEach(source => {
                    source.connections.forEach(targetId => {
                        const target = territories.find(t => t.id === targetId);
                        if(target && target.owner !== id) {
                            let score = source.troops / target.troops;
                            if (personality === 'CONQUEROR') score *= (5 / (target.troops + 1));
                            possibleAttacks.push({ source, target, score });
                        }
                    });
                });

                if (possibleAttacks.length === 0) break;
                possibleAttacks.sort((a,b) => b.score - a.score);
                const bestAttack = possibleAttacks[0];
                
                if (bestAttack && bestAttack.score > attackThreshold) {
                    const singleAttackPromise = new Promise(resolve => {
                        playAttackSound();
                        animations.push(new TroopAnimation(bestAttack.source.x, bestAttack.source.y, bestAttack.target.x, bestAttack.target.y, PLAYER_COLORS[id], () => {
                            battle(bestAttack.source, bestAttack.target);
                            resolve();
                        }));
                    });
                    await singleAttackPromise;
                    if (!checkGameOver()) await delay(400);
                } else { break; }
            }
        }
        
        function runAIFortifyPhase({ id, personality }){
            if(checkGameOver()) return; 
            const myTerritories = territories.filter(t => t.owner === id);
            const border = myTerritories.filter(t => t.connections.some(cId => territories.find(t2=>t2.id===cId)?.owner !== id));
            const inland = myTerritories.filter(t => t.troops > 1 && !border.includes(t));
            if (inland.length > 0 && border.length > 0) {
                const source = inland.sort((a,b) => b.troops - a.troops)[0];
                let dest;
                 switch (personality) {
                     case 'AGGRESSIVE': dest = border.sort((a,b) => b.troops - a.troops).find(b => isPathConnected(source.id, b.id, id)); break;
                     case 'DEFENSIVE': dest = border.sort((a,b) => a.troops - b.troops).find(b => isPathConnected(source.id, b.id, id)); break;
                     default: dest = border.find(b => isPathConnected(source.id, b.id, id)); break;
                 }
                 if(dest && source && source.troops > 1) {
                     const troopsToMove = source.troops - 1;
                     source.troops -= troopsToMove; dest.troops += troopsToMove;
                 }
            }
            updateStatus();
        }

        function checkGameOver() {
            if (gameState === 'GAME_OVER') return true;
            const activePlayers = new Set(territories.map(t => t.owner).filter(o => o > 0));
            if (activePlayers.size <= 1) {
                const winner = activePlayers.values().next().value;
                showGameOver(winner || 0);
                return true;
            }
            return false;
        }

        function showGameOver(winnerId) {
            gameState = 'GAME_OVER';
            const modal = document.getElementById('game-over-modal');
            const title = document.getElementById('game-over-title');
            const text = document.getElementById('game-over-text');
            const now = Tone.now();
            if (winnerId === 1) {
                title.textContent = "SIEG!"; title.style.color = PLAYER_COLORS[1];
                text.textContent = "Du hast die Galaxie erobert! Gut gemacht!";
                playSound('C5', '2n', now); playSound('G5', '2n', now + 0.4);
            } else {
                const ai = aiPlayers.find(p=>p.id===winnerId);
                title.textContent = "NIEDERLAGE"; title.style.color = PLAYER_COLORS[winnerId];
                text.textContent = `${ai?.name || 'Ein Gegner'} (${ai?.personality || ''}) hat gewonnen.`;
                playSound('C3', '2n', now); playSound('G2', '2n', now + 0.4);
            }
            modal.classList.remove('hidden');
        }

        function setupUI() {
            const statsContainer = document.getElementById('players-stats');
            statsContainer.innerHTML = '';
            for (let i = 1; i <= NUM_PLAYERS; i++) {
                const playerDiv = document.createElement('div');
                playerDiv.id = `player-stat-${i}`;
                playerDiv.className = 'transition-opacity duration-500';
                let name, personalityText = '';
                if(i === 1) { name = "Du"; }
                else {
                    const ai = aiPlayers.find(p => p.id === i);
                    name = ai.name;
                    personalityText = `<span class="text-xs opacity-75">${ai.personality.substring(0,4)}.</span>`;
                }
                playerDiv.innerHTML = `<p style="color: ${PLAYER_COLORS[i]}; font-weight: bold;">${name} ${personalityText}</p><p class="text-xs"><span id="player${i}-territories">0</span> Planeten | <span id="player${i}-troops">0</span> Raumschiffe</p>`;
                statsContainer.appendChild(playerDiv);
            }
        }
        
        function updateStatus() {
            const statusEl = document.getElementById('status-text');
            const btn = document.getElementById('end-turn-btn');
            switch(gameState) {
                case 'REINFORCE': statusEl.textContent = `Platziere deine Verstärkung. Übrig: ${reinforcements} Raumschiffe.`; btn.style.display = 'none'; break;
                case 'ATTACK': statusEl.textContent = 'Angriffsphase: Wähle einen Planeten oder beende den Zug.'; btn.textContent = 'Befestigungsphase'; btn.style.display = 'inline-block'; break;
                case 'FORTIFY': statusEl.textContent = hasFortified ? 'Du hast Raumschiffe verschoben.' : 'Befestigungsphase: Raumschiffe verschieben (optional).'; btn.textContent = 'Zug beenden'; break;
                case 'AI_TURN': const ai = aiPlayers.find(p => p.id === currentPlayerId); statusEl.textContent = `${ai?.name || 'KI'} ist am Zug...`; btn.style.display = 'none'; break;
            }
            for (let i = 1; i <= NUM_PLAYERS; i++) {
                const pTerritories = territories.filter(t => t.owner === i);
                const terrCountEl = document.getElementById(`player${i}-territories`);
                const troopCountEl = document.getElementById(`player${i}-troops`);
                const playerStatDiv = document.getElementById(`player-stat-${i}`);
                if(terrCountEl && troopCountEl) {
                    terrCountEl.textContent = pTerritories.length;
                    troopCountEl.textContent = pTerritories.reduce((sum, t) => sum + t.troops, 0);
                    if (playerStatDiv) {
                        if (pTerritories.length === 0 && (gameState !== 'INIT' && gameState !== 'SETUP')) {
                            playerStatDiv.classList.add('opacity-50', 'line-through');
                        } else {
                            playerStatDiv.classList.remove('opacity-50', 'line-through');
                        }
                    }
                }
            }
        }

        function gameLoop() {
            gameTime++;
            if(gameState === 'GAME_OVER') { requestAnimationFrame(gameLoop); return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            territories.forEach(t => t.update());
            territories.forEach(t => t.draw());
            
            animations = animations.filter(anim => {
                const finished = anim.update();
                if(finished && anim.onComplete) anim.onComplete();
                return !finished;
            });
            animations.forEach(anim => anim.draw());
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('click', (e) => {
            if (Tone.context.state !== 'running') { Tone.context.resume(); }
            if (gameState === 'GAME_OVER' || currentPlayerId !== 1) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            const clickedTerritory = territories.find(t => Math.hypot(mouseX - t.x, mouseY - t.y) < TERRITORY_RADIUS);
            if (!clickedTerritory) { selectedTerritory = null; fortifySource = null; return; }
            if (gameState === 'REINFORCE') { handleReinforce(clickedTerritory); }
            else if (gameState === 'ATTACK') {
                if (clickedTerritory.owner === 1) { selectedTerritory = clickedTerritory; playSound('C4', '16n'); }
                else if (selectedTerritory) { handleAttack(selectedTerritory, clickedTerritory); }
            } else if (gameState === 'FORTIFY') {
                 if (clickedTerritory.owner !== 1) return;
                 if (!fortifySource) { fortifySource = clickedTerritory; }
                 else { handleFortify(fortifySource, clickedTerritory); }
            }
        });
        canvas.addEventListener('mousemove', (e) => {
             if(gameState === 'GAME_OVER') return;
             const rect = canvas.getBoundingClientRect();
             const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
             territories.forEach(t => t.isHovered = (Math.hypot(mouseX - t.x, mouseY - t.y) < TERRITORY_RADIUS));
        });
        document.getElementById('start-game-btn').addEventListener('click', () => {
             Tone.start().then(initGame).catch(e => { console.error("Audio konnte nicht gestartet werden:", e); initGame(); });
        });
        document.getElementById('end-turn-btn').addEventListener('click', endTurn);
        document.getElementById('restart-btn').addEventListener('click', () => {
             document.getElementById('game-over-modal').classList.add('hidden');
             document.getElementById('game-container').classList.add('hidden');
             document.getElementById('setup-container').classList.remove('hidden');
        });
        window.onresize = () => { if(gameState !== 'SETUP' && gameState !== 'GAME_OVER') initGame(); };
        gameLoop();
    </script>
</body>
</html>
